<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>My To-Do List</h1>
                <p>Stay organized and productive</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..." 
                    class="input-field"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span>Total: <strong id="totalCount">0</strong></span>
                <span>Completed: <strong id="completedCount">0</strong></span>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Tasks will be added here -->
            </ul>

            <div class="empty-state" id="emptyState">
                <p>📝 No tasks yet. Add one to get started!</p>
            </div>

            <button id="clearBtn" class="clear-btn">Clear Completed</button>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
